<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Immune System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/neutrophil.png">

    <link rel="preload" href="assets/b.png" as="image" type="image/png"/>
    <link rel="preload" href="assets/dentritic.png" as="image" type="image/png"/>
    <link rel="preload" href="assets/macrophage.png" as="image" type="image/png"/>
    <link rel="preload" href="assets/mast.png" as="image" type="image/png"/>
    <link rel="preload" href="assets/naturalkiller.png" as="image" type="image/png"/>
    <link rel="preload" href="assets/neutrophil.png" as="image" type="image/png"/>
    <link rel="preload" href="assets/t.png" as="image" type="image/png"/>

</head>
<body>

    <div class="topnav">
        <a class="active" href="index.html">Immune System</a> 
        <a href="terms.html">Terms of Use</a>
    </div>
    
    <h1 style="text-align: center; clear: both;">The Immune System</h2>
    <hr style="border-top: 3px dashed solid #bbb;">
    <h2 style="text-align: center">Innate Immune System</h2>\
    <hr style="border-top: 3px dashed solid #bbb;">

    <div class="immune-box">
        <div class="immune-item">
            <h3>Dendritic Cell</h3>
            <img class="hover-zoom" src="assets/dentritic.png" alt="dendritic cell vector drawing" onclick="zoom(this)">
        </div>
        <div class="immune-item">
            <h3>Neutrophil Cell</h3>
            <img class="hover-zoom" style="width: 70%" src="assets/neutrophil.png" alt="neutrophil cell vector drawing" onclick="zoom(this)"> 
        </div>
        <div class="immune-item">
            <h3>Macrophage Cell</h3>
            <img class="hover-zoom" src="assets/macrophage.png" alt="macrophil cell vector drawing" onclick="zoom(this)">
        </div>
        <div class="immune-item">
            <h3>Natural Killer Cell</h3>
            <img class="hover-zoom" style="width:70%" src="assets/naturalkiller.png" alt="Natural killer cell vector drawing" onclick="zoom(this)">
        </div>
        <div class="immune-item">
            <h3>Mast Cell</h3>
            <img class="hover-zoom" style="width:70%" src="assets/mast.png" alt="Mast cell vector drawing" onclick="zoom(this)">
        </div>
        <div class="section-break">
            <hr style="border-top: 3px dashed solid #bbb;">
            <h2 style="all: revert; text-align: center; display: block;">Adaptive Immune System</h2>
            <hr style="border-top: 3px dashed solid #bbb;">
        </div>
        <div class="immune-item">
            <h3>T Cell</h3>
            <img class="hover-zoom" style="margin-top: 15px;" src="assets/t.png" alt="T cell vector drawing" onclick="zoom(this)">
        </div>
        <div class="immune-item">
            <h3>B Cell</h3>
            <img class="hover-zoom" style="width: 70%;" src="assets/b.png" alt="B cell vector drawing" onclick="zoom(this)">
        </div>
    </div>
    <!-- keep script at the bottom-->
    <script src="script.js"></script>
</body>
</html>
